name: nyama_pro
description: "NYAMA Pro — App vendeur/cuisinière NYAMA"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.0

  # HTTP client
  dio: ^5.4.0

  # Navigation
  go_router: ^14.0.0

  # WebSocket temps réel
  socket_io_client: ^3.0.0

  # Stockage sécurisé tokens
  flutter_secure_storage: ^9.0.0

  # Cache images
  cached_network_image: ^3.3.0

  # Alertes sonores fortes
  audioplayers: ^6.0.0

  # Vibration longue
  vibration: ^2.0.0

  # Skeleton loaders
  shimmer: ^3.0.0

  # Formatage FCFA et dates
  intl: ^0.19.0

  # Saisie OTP
  pin_code_fields: ^8.0.0

  # Notation étoiles
  flutter_rating_bar: ^4.0.0

  # Appel téléphonique direct
  url_launcher: ^6.2.0

  # SVG support
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
    - assets/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Variable.ttf
    - family: NunitoSans
      fonts:
        - asset: assets/fonts/NunitoSans-Variable.ttf
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#F57C20"
  android: true
  ios: true
